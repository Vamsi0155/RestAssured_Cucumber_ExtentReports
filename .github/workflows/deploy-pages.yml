name: Deploy Report to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rename Spark.html to index.html
        run: |
          cp "./reports/extentReports/SparkReport 10-Apr-25 19-57-11/HtmlReport/ExtentHtml.html" "./reports/extentReports/SparkReport 10-Apr-25 19-57-11/HtmlReport/index.html"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./reports/extentReports/SparkReport 10-Apr-25 19-57-11/HtmlReport

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
